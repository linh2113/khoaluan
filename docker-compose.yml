version: "3.9"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: son1234567890
      MYSQL_DATABASE: techstorefinal
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: spring-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=techstorefinal
      - DB_USERNAME=root
      - DB_PASSWORD=son1234567890
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHON_API_URL=http://fastapi:8001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  # FastAPI Recommendation Service
  fastapi:
    build:
      context: ./APIRecommend
      dockerfile: Dockerfile
    container_name: fastapi-recommend
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=techstorefinal
      - DB_USERNAME=root
      - DB_PASSWORD=son1234567890
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  backend_logs:

networks:
  app-network:
    driver: bridge
